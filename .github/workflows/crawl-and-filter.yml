name: Crawl CMoney and Filter News

on:
  workflow_dispatch:
  # schedule 之後要每天自動跑再打開（先擱置，改用 Cloudflare 或這裡擇一）
  # schedule:
  #   - cron: "0 0 * * *"   # UTC 00:00 = 台北 08:00

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: crawl-cmoney-main
  cancel-in-progress: false

jobs:
  crawl-and-filter:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync latest main
        run: |
          git pull --rebase origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright requests beautifulsoup4
          python -m playwright install --with-deps chromium

      - name: Crawl CMoney
        run: python crawl_cmoney.py

      - name: Filter news with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python filter_news.py

      - name: Crawl Gooaye notes
        run: python crawl_gooaye.py

      - name: Summarize Gooaye notes with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-3.1-flash-lite
        run: python summarize_gooaye.py

      - name: Show CMoney output
        run: |
          echo "==== data/concept_news.json ===="
          if [ -f data/concept_news.json ]; then
            wc -c data/concept_news.json
            head -c 3000 data/concept_news.json
            echo
          else
            echo "data/concept_news.json does not exist"
          fi

      - name: Show Gooaye output
        run: |
          echo "==== data/gooaye_latest_raw.json ===="
          if [ -f data/gooaye_latest_raw.json ]; then
            wc -c data/gooaye_latest_raw.json
            head -c 3000 data/gooaye_latest_raw.json
            echo
          else
            echo "data/gooaye_latest_raw.json does not exist"
          fi

          echo "==== data/gooaye_history.json ===="
          if [ -f data/gooaye_history.json ]; then
            wc -c data/gooaye_history.json
            head -c 3000 data/gooaye_history.json
            echo
          else
            echo "data/gooaye_history.json does not exist"
          fi

          echo "==== data/gooaye_news.json ===="
          if [ -f data/gooaye_news.json ]; then
            wc -c data/gooaye_news.json
            head -c 3000 data/gooaye_news.json
            echo
          else
            echo "data/gooaye_news.json does not exist"
          fi

      - name: Commit generated data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/raw/*.json data/concept_news.json data/gooaye_*.json 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "update CMoney and Gooaye news"

            echo "Pull latest remote main before pushing..."
            git pull --rebase --autostash origin main

            echo "Push generated data..."
            git push origin main
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
