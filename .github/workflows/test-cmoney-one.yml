name: Test CMoney One Concept

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-cmoney-one:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Run test CMoney crawler
        run: python test_cmoney_one.py

      - name: Show generated file
        run: |
          echo "==== data/test_asic_articles.json ===="
          if [ -f data/test_asic_articles.json ]; then
            cat data/test_asic_articles.json
          fi

          echo "==== data/test_asic_error.json ===="
          if [ -f data/test_asic_error.json ]; then
            cat data/test_asic_error.json
          fi

      - name: Commit generated data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/test_asic_articles.json data/test_asic_error.json || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "update test ASIC CMoney articles"
            git push
          fi
