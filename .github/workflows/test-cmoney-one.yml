name: Test CMoney One Concept

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-cmoney-one:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug current files
        run: |
          echo "==== pwd ===="
          pwd

          echo "==== repo files ===="
          ls -la

          echo "==== data files before run ===="
          if [ -d data ]; then
            ls -la data
          else
            echo "data folder does not exist"
          fi

          echo "==== test_cmoney_one.py size ===="
          wc -l test_cmoney_one.py || true
          wc -c test_cmoney_one.py || true

          echo "==== first 80 lines of test_cmoney_one.py ===="
          sed -n '1,80p' test_cmoney_one.py || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Run test CMoney crawler
        run: |
          echo "==== start python ===="
          python test_cmoney_one.py
          echo "==== end python ===="

      - name: Show generated files
        run: |
          echo "==== data files after run ===="
          if [ -d data ]; then
            ls -la data
          fi

          echo "==== data/test_asic_articles.json ===="
          if [ -f data/test_asic_articles.json ]; then
            wc -c data/test_asic_articles.json
            cat data/test_asic_articles.json
          else
            echo "data/test_asic_articles.json does not exist"
          fi

          echo "==== data/test_asic_error.json ===="
          if [ -f data/test_asic_error.json ]; then
            wc -c data/test_asic_error.json
            cat data/test_asic_error.json
          else
            echo "data/test_asic_error.json does not exist"
          fi

      - name: Commit generated data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if [ -f data/test_asic_articles.json ]; then
            git add data/test_asic_articles.json
          fi

          if [ -f data/test_asic_error.json ]; then
            git add data/test_asic_error.json
          fi

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "update test ASIC CMoney articles"
            git push
          fi
