<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>台股概念股新聞 Dashboard</title>

  <style>
    :root {
      --bg: #f3f4f6;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --blue: #2563eb;
      --blue-soft: #eff6ff;
      --indigo-soft: #eef2ff;
      --shadow: 0 4px 14px rgba(15, 23, 42, 0.06);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      background: #111827;
      color: white;
      padding: 24px 32px;
    }

    header h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 0.3px;
    }

    main {
      max-width: 1480px;
      margin: 0 auto;
      padding: 24px 32px 48px;
    }

    .top-bar {
      display: grid;
      grid-template-columns: minmax(220px, 320px) 1fr;
      gap: 16px;
      align-items: stretch;
      margin-bottom: 18px;
    }

    .info-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px 18px;
      box-shadow: var(--shadow);
    }

    .label {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 6px;
    }

    .value {
      font-size: 17px;
      font-weight: 800;
      line-height: 1.5;
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .stat-pill {
      background: white;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 9px 13px;
      font-size: 13px;
      color: #374151;
      box-shadow: var(--shadow);
    }

    .toolbar {
      background: white;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .search-row {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
    }

    .search-input {
      flex: 1;
      min-width: 220px;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 11px 13px;
      font-size: 14px;
      outline: none;
    }

    .search-input:focus {
      border-color: #93c5fd;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .toggle-button {
      border: 1px solid var(--border);
      background: #f9fafb;
      color: #374151;
      border-radius: 12px;
      padding: 10px 13px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
    }

    .toggle-button.active {
      background: #111827;
      border-color: #111827;
      color: white;
    }

    .tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: thin;
    }

    .tab {
      border: 1px solid var(--border);
      background: #f9fafb;
      color: #374151;
      border-radius: 999px;
      padding: 9px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s ease;
    }

    .tab:hover {
      background: #eef2ff;
      color: #3730a3;
    }

    .tab.active {
      background: #111827;
      color: white;
      border-color: #111827;
    }

    .concept-list {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .concept-block {
      width: 100%;
      background: white;
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .concept-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      padding: 18px 20px;
      border-bottom: 1px solid #f3f4f6;
      background: linear-gradient(180deg, #ffffff 0%, #fafafa 100%);
    }

    .concept-title-wrap {
      min-width: 0;
    }

    .concept-title {
      font-size: 24px;
      font-weight: 900;
      line-height: 1.2;
      margin-bottom: 6px;
    }

    .concept-meta {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .concept-count {
      flex-shrink: 0;
      background: var(--blue-soft);
      color: #1d4ed8;
      border: 1px solid #bfdbfe;
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 13px;
      font-weight: 800;
    }

    .news-area {
      padding: 16px 18px 18px;
      max-height: none;
      overflow: visible;
    }

    .news-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
      gap: 12px;
    }

    .news-item {
      border: 1px solid #eef2f7;
      border-radius: 16px;
      padding: 14px 15px;
      background: #ffffff;
      transition: all 0.15s ease;
    }

    .news-item:hover {
      border-color: #c7d2fe;
      box-shadow: 0 6px 16px rgba(37, 99, 235, 0.08);
      transform: translateY(-1px);
    }

    .news-summary {
      font-size: 15px;
      font-weight: 750;
      line-height: 1.72;
      color: #111827;
      white-space: normal;
      overflow: visible;
      word-break: break-word;
    }

    .news-title {
      margin-top: 10px;
      font-size: 13px;
      line-height: 1.5;
      color: #4b5563;
      white-space: normal;
      overflow: visible;
      word-break: break-word;
    }

    .article-link {
      display: inline-block;
      color: var(--blue);
      text-decoration: none;
      font-weight: 700;
      word-break: break-word;
    }

    .article-link:hover {
      text-decoration: underline;
    }

    .news-meta {
      margin-top: 9px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .time-text {
      color: #6b7280;
    }

    .empty {
      color: #9ca3af;
      font-size: 14px;
      padding: 18px;
      background: #f9fafb;
      border-radius: 14px;
    }

    .no-result {
      background: white;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px;
      color: var(--muted);
      text-align: center;
      box-shadow: var(--shadow);
    }

    @media (max-width: 900px) {
      header {
        padding: 20px;
      }

      header h1 {
        font-size: 23px;
      }

      main {
        padding: 18px;
      }

      .top-bar {
        grid-template-columns: 1fr;
      }

      .search-row {
        flex-direction: column;
        align-items: stretch;
      }

      .news-grid {
        grid-template-columns: 1fr;
      }

      .concept-header {
        flex-direction: column;
      }

      .concept-count {
        align-self: flex-start;
      }

      .news-area {
        max-height: none;
        overflow-y: visible;
        padding: 14px;
      }

      .news-item {
        padding: 14px 15px;
      }

      .news-summary {
        font-size: 15px;
        line-height: 1.75;
      }

      .toolbar {
        position: static;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>台股概念股新聞 Dashboard</h1>
  </header>

  <main>
    <section class="top-bar">
      <div class="info-card">
        <div class="label">最後更新</div>
        <div class="value" id="updatedAt">載入中...</div>
      </div>

      <div class="stats" id="statsArea"></div>
    </section>

    <section class="toolbar">
      <div class="search-row">
        <input
          id="searchInput"
          class="search-input"
          type="text"
          placeholder="搜尋概念、新聞內容、標題..."
        />
        <button id="onlyNewsButton" class="toggle-button active">
          只看有新聞
        </button>
      </div>

      <div id="tabs" class="tabs"></div>
    </section>

    <section id="conceptList" class="concept-list"></section>
  </main>

  <script>
    let rawData = null;
    let allConcepts = [];
    let activeConcept = "全部";
    let onlyWithNews = true;

    function escapeHtml(str) {
      return String(str || "").replace(/[&<>"']/g, function (c) {
        return {
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;"
        }[c];
      });
    }

    function renderStats(data) {
      const statsArea = document.getElementById("statsArea");

      const conceptCount = data.concept_count || allConcepts.length;
      const articleCount = data.global_unique_article_count || 0;
      const timeWindow = data.time_window_hours || "?";
      const model = data.model || "";

      statsArea.innerHTML = `
        <div class="stat-pill">概念數：${escapeHtml(conceptCount)}</div>
        <div class="stat-pill">文章數：${escapeHtml(articleCount)}</div>
        <div class="stat-pill">資料範圍：近 ${escapeHtml(timeWindow)}h</div>
        <div class="stat-pill">模型：${escapeHtml(model)}</div>
      `;
    }

    function renderTabs() {
      const tabs = document.getElementById("tabs");

      const conceptNames = [
        "全部",
        ...allConcepts
          .map(item => item.concept_name)
          .filter(Boolean)
      ];

      tabs.innerHTML = conceptNames.map(conceptName => {
        const activeClass = conceptName === activeConcept ? " active" : "";

        return `
          <button class="tab${activeClass}" data-concept="${escapeHtml(conceptName)}">
            ${escapeHtml(conceptName)}
          </button>
        `;
      }).join("");

      document.querySelectorAll(".tab").forEach(button => {
        button.addEventListener("click", function () {
          activeConcept = this.getAttribute("data-concept");
          renderTabs();
          renderConcepts();
        });
      });
    }

    function renderNewsItem(item) {
      const summary = item.summary || "";
      const title = item.title || "查看原文";
      const url = item.url || "";
      const time = item.time || "";

      const linkHtml = url
        ? `
          ${escapeHtml(url)}
            查看原文：${escapeHtml(title)}
          </a>
        `
        : escapeHtml(title);

      return `
        <article class="news-item">
          <div class="news-summary">
            ${escapeHtml(summary)}
          </div>

          <div class="news-title">
            ${linkHtml}
          </div>

          <div class="news-meta">
            <span class="time-text">${escapeHtml(time)}</span>
          </div>
        </article>
      `;
    }

    function renderConcept(concept) {
      const news = Array.isArray(concept.news) ? concept.news : [];
      const newsCount = news.length;

      const body = newsCount === 0
        ? `<div class="empty">近期沒有重要新聞</div>`
        : `<div class="news-grid">${news.map(renderNewsItem).join("")}</div>`;

      return `
        <section class="concept-block">
          <div class="concept-header">
            <div class="concept-title-wrap">
              <div class="concept-title">
                ${escapeHtml(concept.concept_name || "")}
              </div>
              <div class="concept-meta">
                ${escapeHtml(concept.category || "未分類")}
                ${concept.note ? "｜" + escapeHtml(concept.note) : ""}
              </div>
            </div>

            <div class="concept-count">
              ${newsCount} 則
            </div>
          </div>

          <div class="news-area">
            ${body}
          </div>
        </section>
      `;
    }

    function filterConcepts() {
      const keyword = document.getElementById("searchInput").value.trim().toLowerCase();

      return allConcepts.filter(concept => {
        const news = Array.isArray(concept.news) ? concept.news : [];
        const newsCount = news.length;

        if (onlyWithNews && newsCount === 0) {
          return false;
        }

        if (activeConcept !== "全部" && concept.concept_name !== activeConcept) {
          return false;
        }

        if (!keyword) {
          return true;
        }

        const searchableText = [
          concept.concept_name,
          concept.category,
          concept.note,
          ...news.map(item => [
            item.title,
            item.summary,
            item.time
          ].join(" "))
        ].join(" ").toLowerCase();

        return searchableText.includes(keyword);
      });
    }

    function renderConcepts() {
      const conceptList = document.getElementById("conceptList");
      const filtered = filterConcepts();

      if (filtered.length === 0) {
        conceptList.innerHTML = `
          <div class="no-result">
            沒有符合條件的概念或新聞
          </div>
        `;
        return;
      }

      conceptList.innerHTML = filtered.map(renderConcept).join("");
    }

    async function loadData() {
      const response = await fetch("data/concept_news.json?" + Date.now());
      const data = await response.json();

      rawData = data;
      allConcepts = Array.isArray(data.concepts) ? data.concepts : [];

      document.getElementById("updatedAt").textContent =
        (data.updated_at || "") + "（近 " + (data.time_window_hours || "?") + "h）";

      renderStats(data);
      renderTabs();
      renderConcepts();
    }

    document.getElementById("searchInput").addEventListener("input", renderConcepts);

    document.getElementById("onlyNewsButton").addEventListener("click", function () {
      onlyWithNews = !onlyWithNews;
      this.classList.toggle("active", onlyWithNews);
      this.textContent = onlyWithNews ? "只看有新聞" : "顯示全部概念";
      renderConcepts();
    });

    loadData().catch(function (err) {
      document.getElementById("updatedAt").textContent = "載入失敗：" + err;
    });
  </script>
</body>
</html>
