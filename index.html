<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>台股概念股新聞 Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background: #f3f4f6;
      color: #111827;
    }

    header {
      background: #111827;
      color: white;
      padding: 24px 32px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 32px;
    }

    .card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.06);
    }

    .label {
      color: #6b7280;
      font-size: 13px;
      margin-bottom: 6px;
    }

    .value {
      font-size: 18px;
      font-weight: 800;
    }

    .concept-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 18px;
      margin-top: 20px;
    }

    .concept-block {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.06);
    }

    .concept-title {
      font-size: 21px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .news-item {
      border-top: 1px solid #f3f4f6;
      padding-top: 10px;
      margin-top: 10px;
      line-height: 1.6;
    }

    .meta {
      color: #6b7280;
      font-size: 12px;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <header>
    <h1>台股概念股新聞 Dashboard</h1>
  </header>

  <main>
    <section class="card">
      <div class="label">最後更新</div>
      <div class="value" id="updatedAt">載入中...</div>
    </section>

    <section class="concept-grid">
      <article class="concept-block">
        <div class="concept-title">ASIC</div>
        <div class="news-item">
          ASIC 供應鏈題材升溫，市場關注雲端大廠自研晶片趨勢
          <div class="meta">Sample ｜ 2026/07/03 10:20</div>
        </div>
      </article>

      <article class="concept-block">
        <div class="concept-title">TPU</div>
        <div class="news-item">
          TPU 題材延續熱度，市場聚焦 Google AI 加速器供應鏈
          <div class="meta">Sample ｜ 2026/07/03 09:15</div>
        </div>
      </article>

      <article class="concept-block">
        <div class="concept-title">CoWoS</div>
        <div class="news-item">
          CoWoS 產能持續受市場關注，AI 晶片封裝需求維持高檔
