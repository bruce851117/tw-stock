<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>台股概念股新聞 Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background: #f3f4f6;
      color: #111827;
    }

    header {
      background: #111827;
      color: white;
      padding: 24px 32px;
    }

    header h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 800;
    }

    header p {
      margin: 8px 0 0;
      color: #d1d5db;
      font-size: 14px;
    }

    main {
      max-width: 1440px;
      margin: 0 auto;
      padding: 24px 32px 40px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
      align-items: center;
    }

    input,
    select {
      background: white;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      color: #111827;
    }

    input {
      min-width: 320px;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 14px;
      margin-bottom: 22px;
    }

    .summary-card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.05);
    }

    .summary-card .label {
      color: #6b7280;
      font-size: 13px;
      margin-bottom: 6px;
    }

    .summary-card .value {
      font-size: 26px;
      font-weight: 800;
    }

    .concept-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 18px;
    }

    .concept-block {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.06);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 240px;
    }

    .concept-header {
      padding: 16px 18px 12px;
      border-bottom: 1px solid #f3f4f6;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .concept-title-wrap {
      min-width: 0;
    }

    .concept-title {
      font-size: 21px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .concept-category {
      font-size: 13px;
      color: #6b7280;
    }

    .badge {
      flex-shrink: 0;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 13px;
      font-weight: 800;
    }

    .badge-s {
      background: #fee2e2;
      color: #b91c1c;
    }

    .badge-a {
      background: #fef3c7;
      color: #92400e;
    }

    .badge-b {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .news-list {
      padding: 4px 18px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .news-item {
      border-bottom: 1px solid #f3f4f6;
      padding: 10px 0;
    }

    .news-item:last-child {
      border-bottom: none;
    }

    .news-title {
      font-size: 15px;
      line-height: 1.55;
      font-weight: 650;
      color: #111827;
      text-decoration: none;
    }

    .news-title:hover {
      color: #2563eb;
      text-decoration: underline;
    }

    .news-meta {
      margin-top: 5px;
      font-size: 12px;
      color: #6b7280;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .empty-news {
      padding: 20px 18px;
      color: #9ca3af;
      font-size: 14px;
    }

    .hidden {
      display: none;
    }

    footer {
      text-align: center;
      color: #6b7280;
      font-size: 13px;
      padding: 24px;
    }

    @media (max-width: 768px) {
      header {
        padding: 20px;
      }

      main {
        padding: 18px;
      }

      input {
        min-width: 100%;
      }

      .concept-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>台股概念股新聞 Dashboard</h1>
    <p>以概念股為單位整理新聞，每個概念一個 block，方便追蹤市場題材輪動。</p>
  </header>

  <main>
    <section class="summary">
      <div class="summary-card">
        <div class="label">概念數量</div>
        <div class="value" id="conceptCount">-</div>
      </div>
      <div class="summary-card">
        <div class="label">新聞數量</div>
        <div class="value" id="newsCount">-</div>
      </div>
      <div class="summary-card">
        <div class="label">S 級概念</div>
        <div class="value" id="sCount">-</div>
      </div>
      <div class="summary-card">
        <div class="label">最後更新</div>
        <div class="value" id="updatedAt" style="font-size: 18px;">-</div>
      </div>
    </section>

    <section class="toolbar">
      <input id="searchInput" type="text" placeholder="搜尋概念或新聞，例如 ASIC、TPU、CoWoS、聯發科..." />

      <select id="importanceFilter">
        <option value="ALL">全部重要性</option>
        <option value="S">S 級</option>
        <option value="A">A 級</option>
        <option value="B">B 級</option>
      </select>

      <select id="categoryFilter">
        <option value="ALL">全部分類</option>
      </select>
    </section>

    <section id="conceptGrid" class="concept-grid"></section>
  </main>

  <footer>
    Data: data/concept_news.json
  </footer>

  <script>
    let conceptNews = [];

    async function loadData() {
      const response = await fetch("./data/concept_news.json?t=" + Date.now());
      conceptNews = await response.json();

      initCategoryFilter();
      updateSummary(conceptNews);
      renderBlocks(conceptNews);
    }

    function initCategoryFilter() {
      const categoryFilter = document.getElementById("categoryFilter");
      const categories = [...new Set(conceptNews.map(item => item.category).filter(Boolean))].sort();

      categories.forEach(category => {
        const option = document.createElement("option");
        option.value = category;
        option.textContent = category;
        categoryFilter.appendChild(option);
      });
    }

    function updateSummary(data) {
      const totalNews = data.reduce((sum, item) => sum + (item.news ? item.news.length : 0), 0);
      const sCount = data.filter(item => item.importance === "S").length;

      document.getElementById("conceptCount").textContent = data.length;
      document.getElementById("newsCount").textContent = totalNews;
      document.getElementById("sCount").textContent = sCount;

      const now = new Date();
      document.getElementById("updatedAt").textContent =
        now.getFullYear() + "/" +
        String(now.getMonth() + 1).padStart(2, "0") + "/" +
        String(now.getDate()).padStart(2, "0") + " " +
        String(now.getHours()).padStart(2, "0") + ":" +
        String(now.getMinutes()).padStart(2, "0");
    }

    function getBadgeClass(importance) {
      if (importance === "S") return "badge badge-s";
      if (importance === "A") return "badge badge-a";
      return "badge badge-b";
    }

    function renderBlocks(data) {
      const grid = document.getElementById("conceptGrid");
      grid.innerHTML = "";

      if (!data.length) {
        grid.innerHTML = "<div>沒有符合條件的資料</div>";
        return;
      }

      data.forEach(concept => {
        const block = document.createElement("article");
        block.className = "concept-block";

        const newsHtml = concept.news && concept.news.length
