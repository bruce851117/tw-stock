<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>台股概念股新聞 Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background: #f3f4f6;
      color: #111827;
    }

    header {
      background: #111827;
      color: white;
      padding: 24px 32px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 32px;
    }

    .card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.06);
    }

    .label {
      color: #6b7280;
      font-size: 13px;
      margin-bottom: 6px;
    }

    .value {
      font-size: 18px;
      font-weight: 800;
    }

    .concept-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 18px;
      margin-top: 20px;
    }

    .concept-block {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.06);
    }

    .concept-title {
      font-size: 21px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .concept-meta {
      color: #6b7280;
      font-size: 12px;
      margin-bottom: 8px;
    }

    .news-item {
      border-top: 1px solid #f3f4f6;
      padding-top: 10px;
      margin-top: 10px;
      line-height: 1.6;
    }

    .news-point {
      font-weight: 600;
    }

    .news-title {
      font-size: 13px;
      color: #374151;
      margin-top: 2px;
    }

    .news-title a {
      color: #2563eb;
      text-decoration: none;
    }

    .news-title a:hover {
      text-decoration: underline;
    }

    .meta {
      color: #6b7280;
      font-size: 12px;
      margin-top: 4px;
    }

    .empty {
      color: #9ca3af;
      font-size: 14px;
      padding-top: 10px;
    }

    .stock-tag {
      display: inline-block;
      background: #eef2ff;
      color: #4338ca;
      border-radius: 6px;
      padding: 1px 6px;
      font-size: 11px;
      margin-right: 4px;
    }
  </style>
</head>
<body>
  <header>
    <h1>台股概念股新聞 Dashboard</h1>
  </header>

  <main>
    <section class="card">
      <div class="label">最後更新</div>
      <div class="value" id="updatedAt">載入中...</div>
    </section>

    <section class="concept-grid" id="conceptGrid"></section>
  </main>

  <script>
    function escapeHtml(str) {
      return (str || "").replace(/[&<>"']/g, function (c) {
        return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
      });
    }

    function renderNewsItem(item) {
      var stocks = (item.stocks || [])
        .map(function (s) { return '<span class="stock-tag">' + escapeHtml(s) + "</span>"; })
        .join("");

      var titleHtml = escapeHtml(item.title);
      if (item.url) {
        titleHtml = '<a href="' + escapeHtml(item.url) + '" target="_blank" rel="noopener">' + titleHtml + "</a>";
      }

      return (
        '<div class="news-item">' +
          '<div class="news-point">' + escapeHtml(item.point) + "</div>" +
          '<div class="news-title">' + titleHtml + "</div>" +
          '<div class="meta">' + stocks + escapeHtml(item.time || "") + "</div>" +
        "</div>"
      );
    }

    function renderConcept(concept) {
      var news = concept.news || [];
      var body;
      if (news.length === 0) {
        body = '<div class="empty">近期沒有重要新聞</div>';
      } else {
        body = news.map(renderNewsItem).join("");
      }

      return (
        '<article class="concept-block">' +
          '<div class="concept-title">' + escapeHtml(concept.concept_name) + "</div>" +
          '<div class="concept-meta">' + escapeHtml(concept.category || "") + "</div>" +
          body +
        "</article>"
      );
    }

    fetch("data/concept_news.json?" + Date.now())
      .then(function (res) { return res.json(); })
      .then(function (data) {
        document.getElementById("updatedAt").textContent =
          (data.updated_at || "") + "（近 " + (data.time_window_hours || "?") + "h ｜ " + (data.model || "") + "）";

        var grid = document.getElementById("conceptGrid");
        grid.innerHTML = (data.concepts || []).map(renderConcept).join("");
      })
      .catch(function (err) {
        document.getElementById("updatedAt").textContent = "載入失敗：" + err;
      });
  </script>
</body>
</html>
